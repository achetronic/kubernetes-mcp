# MCP Server Configuration - Stdio Mode
server:
  name: "Kubernetes MCP"
  version: "0.1.0"
  transport:
    type: "stdio"

# Middleware Configuration
middleware:
  access_logs:
    excluded_headers: []
    redacted_headers: []

  jwt:
    enabled: false

  api_keys:
    enabled: false

# Kubernetes Configuration
kubernetes:
  default_context: "default"
  contexts:
    - name: "default"
      kubeconfig: ""  # Uses ~/.kube/config
      description: "Local Kubernetes cluster"
      allowed_namespaces: []
      denied_namespaces: []

  # Auto-load kubeconfigs from directory (context name = current-context of each file)
  # contexts_dir: "/shared/kubeconfigs/"

  # Discovery cache controls how often the API discovery results (used by the
  # RESTMapper to resolve Kind -> Resource for apply_manifest / diff_manifest)
  # are refreshed. Defaults to 10m if omitted.
  discovery:
    refresh_interval: "10m"

  tools:
    bulk_operations:
      max_resources_per_operation: 100

# Authorization Configuration - Allow all for local usage
authorization:
  allow_anonymous: true
  policies:
    - name: "allow-all"
      description: "Allow all tools for local usage"
      match:
        expression: "true"
      rules:
        - effect: allow
          tools: ["*"]
          contexts: ["*"]
          resources:
            - groups: ["*"]
              resources: ["*"]
            - groups: ["_"]
              resources: ["*"]
